name: Pipeline CI/CD

on:
  push:
    branches:
      - main
    paths: # Só dispara se arquivos nessas pastas mudarem
      - "src/**" # Mudanças no código fonte
      - ".github/workflows/**" # Mudanças nos próprios pipelines

  workflow_dispatch: # Habilita o botão "Run workflow" no GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./cinelista

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: ./cinelista/package-lock.json

      - name: Instalação das dependências
        run: npm install

      - name: Rodar build
        run: npm run build
        env:
          TMDB_API_URL: ${{ vars.TMDB_API_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          NEXT_PUBLIC_TMDB_API_IMG_URL: ${{ vars.NEXT_PUBLIC_TMDB_API_IMG_URL }}

  tests:
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: ./cinelista

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: ./cinelista/package-lock.json

      - name: Instalação das dependências
        run: npm install

      - name: Rodar lint
        run: npm run lint

      - name: Rodar testes
        run: npm run test
        
  
